<div class="confirmation-container">
  <div class="success-message">
    <h1>Pedido Confirmado!</h1>
    <p>Seu pedido foi realizado com sucesso.</p>
  </div>
  <div class="order-details">
    <h2>Número do Pedido: #12345</h2>
    <p>Status: Processando</p>
    <!-- Resumo do pedido -->
  </div>
  <div class="actions">
    <button class="btn-primary" (click)="trackOrder()">Acompanhar Pedido</button>
    <button class="btn-secondary" (click)="goHome()">Voltar para Home</button>
    <button class="btn-secondary" (click)="continueShopping()">Continuar Comprando</button>
  </div>
</div>
